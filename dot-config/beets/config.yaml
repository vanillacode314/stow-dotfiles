directory: /home/media/Music
library: /home/media/Music/beets.db
import:
  move: no
  copy: no
  link: no
  hardlink: no
  reflink: no
  write: yes
  autotag: yes
  from_scratch: yes
  # quiet: yes
  # quiet_fallback: skip
  incremental: yes
  resume: yes
  duplicate_action: remove
plugins: fromfilename fetchart lyrics lastgenre fish embedart replaygain chroma ftintitle musicbrainz
  info mbsync badfiles
badfiles:
  check_on_import: no
  commands:
    flac: flac --test --silent
ftintitle:
  auto: yes
chroma:
  auto: no
lyrics:
  auto: yes
  sources: lrclib genius
  synced: yes
fetchart:
  auto: yes
lastgenre:
  auto: yes
  source: track
embedart:
  auto: yes
  remove_art_file: yes
replaygain:
  auto: no
  backend: ffmpeg
musicbrainz:
    host: musicbrainz.org
    https: no
    ratelimit: 1
    ratelimit_interval: 1.0
    extra_tags: []
    genres: no
    genres_tag: genre
    external_ids:
        discogs: no
        bandcamp: no
        spotify: no
        deezer: no
        beatport: no
        tidal: no
    data_source_mismatch_penalty: 0.5
    search_limit: 5
