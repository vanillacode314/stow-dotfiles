# Sunshine
exec-once=systemctl --user start sunshine

workspace=11,monitor:SUNSHINE,border:false,rounding:false,decorate:false,shadow:false

windowrule {
  name = sunshine
  match:workspace = 11
  fullscreen = on
  immediate = on
  maximize = on
}
# windowrule=noinitialfocus,workspace:11
# windowrule=nofocus on,workspace:11

windowrule {
  name = gamescope
  match:class = gamescope
  match:class = .gamescope-wrapped

  monitor = SUNSHINE
}

# windowrule = workspace 2,class:^(firefox)$
