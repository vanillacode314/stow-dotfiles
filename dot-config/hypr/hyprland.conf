    # }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic mouse V1 {
#     sensitivity = -0.5
# }

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
$secondaryMod = SUPERSHIFT

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, alacritty
bind = $mainMod, E, killactive,
bind = $secondaryMode, E, exec, hyprctl kill
bind = $secondaryMod, Q, exec, uwsm stop
bind = ,F10, exec, $HOME/.config/hypr/scripts/powermenu
bind = $mainMod,P, exec, $HOME/.config/hypr/scripts/quickclip
bind = $secondaryMod, S, togglefloating,
bind = $mainMod, Space, exec, sh -c 'exec $(tofi-run --require-match=false --fuzzy-match=true)'
bind = $secondaryMod, D, exec, $HOME/.config/hypr/scripts/emoji-selector

# Apps
bind = SUPERALT, B, exec, $BROWSER
bind = SUPERALT, D, exec, dev.vencord.Vesktop
bind = SUPERALT, W, exec, nsxiv -a -f -t /home/media/Sync/Wallpapers

# hyprscrolling
bind = $mainMod, h, layoutmsg, move -col
bind = $mainMod, l, layoutmsg, move +col
bind = $secondaryMod, h, layoutmsg, swapcol l
bind = $secondaryMod, l, layoutmsg, swapcol r
# bind = $secondaryMod, k, layoutmsg, movewindowto u
# bind = $secondaryMod, j, layoutmsg, movewindowto d
bind = SUPERALT, h, layoutmsg, colresize -conf
bind = SUPERALT, l, layoutmsg, colresize +conf

# hyprexpo
# bind = $mainMod, g, hyprexpo:expo, toggle

# # Move focus with mainMod + hjkl keys
# bind = $mainMod, h, movefocus, l
# bind = $mainMod, l, movefocus, r
# bind = $mainMod, k, movefocus, u
# bind = $mainMod, j, movefocus, d
#
# # Move window with mainMod + shift + hjkl keys
# bind = $secondaryMod, h, movewindow, l
# bind = $secondaryMod, l, movewindow, r
# bind = $secondaryMod, k, movewindow, u
# bind = $secondaryMod, j, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, -, workspace, 11

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, _, movetoworkspace, 11

bind = $mainMod, S, swapactiveworkspaces, HDMI-A-1 eDP-1
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, F, fullscreen
bind = $mainMod, G, layoutmsg, swapwithmaster

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86MonBrightnessUp, exec, brightnessctl up 5
bind = , XF86MonBrightnessDown, exec, brightnessctl down 5
bind = , XF86AudioMicMute, exec, pamixer --default-source -m
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Scratchpads
bind = $mainMod,U,exec,pypr-client toggle term
bind = $secondaryMod,Y,exec,pypr-client toggle top
bind = $secondaryMod,M,exec,pypr-client toggle music
bind = $secondaryMod,F,exec,pypr-client toggle fm
bind = $secondaryMod,P,exec,pypr-client toggle volume

# Lid Switch
## Sleep on lid close
bindl = , switch:on:Lid Switch, exec, systemctl suspend-then-hibernate
## Lock screen on lid close
# bindl = , switch:on:Lid Switch, exec, loginctl lock-session && sleep 1 && hyprctl dispatch dpms off
# bindl = , switch:on:Lid Switch, exec, sleep 1 && hyprctl dispatch dpms off
# bindl = , switch:off:Lid Switch, exec, sleep 1 && hyprctl dispatch dpms on

bind = $mainMod, V, exec, clipman pick -t bemenu

# Screenshot
bind = ,F12,exec,fish -c "grim -g (slurp) ~/Screenshots/screenshot_(date  +%Y-%m-%dT%H:%M:%S%Z).png"

# Dunst
bind = CTRL, space, exec, makoctl dismiss --all
bind = CTRL, grave, exec, makoctl restore
bind = CTRL SHIFT, period, exec, makoctl menu bemenu

