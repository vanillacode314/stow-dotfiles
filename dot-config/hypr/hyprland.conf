# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 0

    touchpad {
      natural_scroll = true
    }

    sensitivity = 0.0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = "adaptive"
    force_no_accel = false
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = 0
    border_size = 3
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = scrolling
}

cursor {
    inactive_timeout = 5
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0
    blur {
        enabled = false
        size = 5
        passes = 2
        new_optimizations = on
    }
    shadow {
      enabled = false
      range = 4
      render_power = 3
      color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes
  # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more


    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windowsIn, off
    animation = windowsOut, off
    animation = windowsMove, 1, 7, myBezier
    animation = fade, off
    animation = border, 1, 10, default
    animation = workspaces, off

    ## Defaults
    # animation = workspaces, 1, 6, default
    # animation = windows, 1, 7, myBezier
    # animation = windowsOut, 1, 7, default, popin 80%
    # animation = fade, 1, 7, default
}

scrolling {
    column_width = 0.95
    fullscreen_on_one_column = true
    focus_fit_method = 1
    explicit_column_widths = 0.5, 0.7, 0.95, 1.0
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    default_split_ratio = 1.5
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = master
    mfact = 0.6
}

misc {
    enable_swallow = false
    swallow_regex = ^(ghostty|Alacritty|kitty|footclient)$
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
}

xwayland {
  enabled = true
  force_zero_scaling = true
}

plugin {
    # hyprexpo {
